name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend-auth
          - backend-student
          - backend-notification
          - frontend-main
          - frontend-admission
          - frontend-admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.service }}
        run: npm ci || npm install

      - name: Build (frontends)
        if: startsWith(matrix.service, 'frontend-')
        working-directory: ${{ matrix.service }}
        run: npm run build

      - name: Test
        working-directory: ${{ matrix.service }}
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend-auth
            context: backend-auth
          - name: backend-student
            context: backend-student
          - name: backend-notification
            context: backend-notification
          - name: frontend-main
            context: frontend-main
          - name: frontend-admission
            context: frontend-admission
          - name: frontend-admin
            context: frontend-admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (optional)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/pn-${{ matrix.image.name }}:latest

