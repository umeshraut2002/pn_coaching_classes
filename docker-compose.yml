name: pn-coaching-classes

services:
  mongo:
    image: mongo:7
    container_name: pn_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-rootpass}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pn_net

  auth:
    build:
      context: ./backend-auth
    container_name: pn_auth
    restart: unless-stopped
    env_file:
      - ./backend-auth/.env
    depends_on:
      - mongo
    networks:
      - pn_net

  student:
    build:
      context: ./backend-student
    container_name: pn_student
    restart: unless-stopped
    env_file:
      - ./backend-student/.env
    depends_on:
      - mongo
      - auth
      - notification
    networks:
      - pn_net

  notification:
    build:
      context: ./backend-notification
    container_name: pn_notification
    restart: unless-stopped
    env_file:
      - ./backend-notification/.env
    depends_on:
      - mongo
    networks:
      - pn_net

  frontend_main:
    build:
      context: ./frontend-main
    container_name: pn_frontend_main
    restart: unless-stopped
    networks:
      - pn_net

  frontend_admission:
    build:
      context: ./frontend-admission
    container_name: pn_frontend_admission
    restart: unless-stopped
    networks:
      - pn_net

  frontend_admin:
    build:
      context: ./frontend-admin
    container_name: pn_frontend_admin
    restart: unless-stopped
    networks:
      - pn_net

  nginx:
    image: nginx:1.27-alpine
    container_name: pn_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth
      - student
      - notification
      - frontend_main
      - frontend_admission
      - frontend_admin
    networks:
      - pn_net

volumes:
  mongo_data:

networks:
  pn_net:
    driver: bridge

